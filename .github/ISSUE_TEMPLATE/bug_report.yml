name: Bug 报告
 description: 报告一个可复现的问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈！请尽量填写以下信息，方便我们快速定位问题。
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述你遇到的 bug。
      placeholder: 输入 Markdown 后点击复制，粘贴到公众号时格式丢失……
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 请提供从打开页面到触发问题的具体步骤。
      placeholder: |
        1. 打开 https://health-525.github.io/wechat-article-formatter/
        2. 粘贴以下 Markdown：
        3. 点击「复制」
        4. 粘贴到公众号编辑器
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 描述你期望看到的结果。
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: 浏览器及版本
      placeholder: Chrome 126 / Edge 126 / Safari 17
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: 截图或录屏
      description: 如果有截图或录屏，请直接粘贴或上传。
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: 控制台报错
      description: 按 F12 打开开发者工具，复制 Console 中的红色报错信息。
      render: text
    validations:
      required: false
